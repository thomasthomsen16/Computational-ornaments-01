<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Computational Ornaments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio&family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="title">
      <h1>Computational ornament 01</h1>
      <p>Spinning broken circles in a grid</p>
    </div>

    <div class="controls">
      <div class="control">
        <label for="noise-speed">Noise speed — <span id="noise-speed-val">0.005</span></label>
        <input type="range" id="noise-speed" min="0" max="0.05" step="0.001" value="0.005">
      </div>
      <div class="control">
        <label for="steps">Steps — <span id="steps-val">40</span></label>
        <input type="range" id="steps" min="5" max="80" step="1" value="40">
      </div>
      <div class="control">
        <label for="noise-scale">Noise scale — <span id="noise-scale-val">0.40</span></label>
        <input type="range" id="noise-scale" min="0.05" max="2" step="0.05" value="0.4">
      </div>
      <div class="control">
        <label for="noise-amt">Noise amount — <span id="noise-amt-val">10</span></label>
        <input type="range" id="noise-amt" min="0" max="50" step="1" value="10">
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
